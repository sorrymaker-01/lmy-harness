<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lmy' Harness Agent</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar">
        <button id="sidebarToggle" class="sidebarToggle" type="button" aria-label="收起侧边栏" aria-expanded="true">
          <span id="sidebarToggleTip" class="sidebarToggleTip">收起侧边栏</span>
        </button>
        <div class="sidebarHeader">
          <h1>Lmy' Harness Agent</h1>
          <button id="newConversation" class="newChatButton" type="button" data-tip="创建一个新的对话"><span class="sidebarNavIcon">+</span><span>新建对话</span></button>
          <button id="skillsNav" class="sidebarNavButton" type="button" data-tip="查看、启用或删除技能"><span class="sidebarNavIcon">✦</span><span>技能库</span></button>
          <button id="knowledgeNav" class="sidebarNavButton" type="button" data-tip="管理知识库和导入文件"><span class="sidebarNavIcon">▤</span><span>知识库</span></button>
          <button id="modelNav" class="sidebarNavButton" type="button" data-tip="配置推理模型和向量模型"><span class="sidebarNavIcon">◉</span><span>模型配置</span></button>
        </div>
        <div class="sidebarPanel">
          <div id="conversationList" class="conversationList" aria-label="历史对话"></div>
        </div>
      </aside>

      <section class="chatPane">
        <header class="chatHeader">
          <div>
            <div class="eyebrow">Lmy' Harness Agent</div>
            <h2 id="conversationTitle">Conversation</h2>
          </div>
        </header>

        <div id="messages" class="messages" aria-live="polite"></div>
        <nav id="messageLocator" class="messageLocator hidden" aria-label="对话定位"></nav>

        <section id="skillPage" class="skillPage hidden" aria-label="技能库">
          <div class="skillShell">
            <div class="skillToolbar">
              <input id="skillSearch" class="skillSearchInput" type="search" placeholder="搜索 Skill" autocomplete="off" />
            </div>
            <div id="skillList" class="skillList" aria-live="polite"></div>
          </div>
        </section>

        <section id="knowledgePage" class="knowledgePage hidden" aria-label="知识库">
          <div class="knowledgeShell">
            <div class="knowledgeToolbar">
              <div>
                <h3>知识库</h3>
                <p>创建知识库后导入文件</p>
              </div>
              <button id="createKnowledgeBase" class="knowledgeBaseAddButton" type="button">新建知识库</button>
              <button id="addKnowledge" class="knowledgeAddButton" type="button">添加</button>
              <input id="knowledgeFileInput" class="hidden" type="file" />
            </div>
            <div class="knowledgeLayout">
              <div id="knowledgeBaseList" class="knowledgeBaseList" aria-live="polite"></div>
              <div id="knowledgeList" class="knowledgeList" aria-live="polite"></div>
            </div>
          </div>
        </section>

        <section id="modelPage" class="modelPage hidden" aria-label="模型配置">
          <div class="modelShell">
            <div class="modelToolbar">
              <div>
                <h3>模型配置</h3>
                <p>自定义模型连接配置</p>
              </div>
              <button id="addModelConfig" class="modelAddButton" type="button">添加模型</button>
            </div>
            <div id="modelConfigList" class="modelConfigList" aria-live="polite"></div>
          </div>
        </section>

        <form id="composer" class="composer">
          <div class="composerInput">
            <textarea id="messageInput" rows="2" placeholder="询问 Lmy' Harness Agent，或输入 / 使用技能"></textarea>
            <div id="skillMenu" class="slashMenu hidden" role="listbox" aria-label="Skill 快捷菜单"></div>
            <div class="composerControls">
              <label class="composerControlGroup">
                <span>知识库选择</span>
                <select id="ragKnowledgeSelector" class="knowledgeSelector" aria-label="知识库选择"></select>
              </label>
              <label class="composerControlGroup">
                <span>模型选择</span>
                <select id="primaryModelSelector" class="modelSelector" aria-label="模型选择"></select>
              </label>
              <div class="multiModelPicker">
                <button id="multiModelToggle" class="multiModelToggle" type="button" aria-expanded="false">开启多模型回答</button>
                <div id="multiModelPopover" class="multiModelPopover hidden" role="dialog" aria-label="多模型回答模型选择"></div>
              </div>
            </div>
            <div id="modelModeHint" class="modelModeHint">默认只使用模型选择中的模型回答；点击“开启多模型回答”可选择最多 2 个副模型并列回答。</div>
          </div>
          <button id="sendButton" type="submit">发送</button>
        </form>
      </section>
    </main>
    <div id="modalRoot" class="modalRoot hidden" aria-live="polite"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
